name: RAG extract

# Regenerate _Tools/extract_for_rag/rag-extracted/ HTML + sitemap.xml from Tier-1 hardware files,
# commit it back, and publish it to GitHub Pages (ragpi's sitemap connector crawls the published
# sitemap). Runs on every merge to master (incremental by default); ignores its own commits
# (paths-ignore on the output dir). A clean full rebuild is opt-in via workflow_dispatch.

on:
  push:
    branches: [master]
    paths-ignore:
      - '_Tools/extract_for_rag/rag-extracted/**'
  workflow_dispatch:
    inputs:
      full:
        description: 'Full clean rebuild (wipe + re-extract everything, incl. all schematics)'
        type: boolean
        default: false

permissions:
  contents: write   # commit refreshed output back to master
  pages: write      # publish to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: rag-extract
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7   # Node 24 runtime
        with:
          fetch-depth: 0   # full history for change detection

      - uses: actions/setup-python@v6   # Node 24 runtime
        with:
          python-version: '3.12'

      - name: Install pipeline deps
        run: pip install -r _Tools/extract_for_rag/requirements.txt

      - name: Compute changed source files
        id: changed
        run: |
          # Incremental is the default. Only an explicit workflow_dispatch with full=true rebuilds.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full }}" = "true" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "push" ] && \
               [ -n "${{ github.event.before }}" ] && \
               [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && \
               git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
              git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed.txt
              echo "Changed files:"; cat changed.txt
            else
              : > changed.txt   # no base (first run / new branch): reconcile regenerates anything missing
              echo "No diff base; relying on reconcile (generate-missing + prune)."
            fi
          fi

      - name: Run extraction
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_VLM_MODEL: ${{ vars.RAG_VLM_MODEL }}             # optional; tool defaults to gpt-5.5
          RAG_BASE_URL: ${{ vars.RAG_BASE_URL }}               # optional; defaults to the Pages URL
          RAG_SOURCE_BASE_URL: ${{ vars.RAG_SOURCE_BASE_URL }} # optional; defaults to GitHub blob
        run: |
          cd _Tools/extract_for_rag
          if [ "${{ steps.changed.outputs.mode }}" = "full" ]; then
            python extract.py --full
          else
            python extract.py --changed-from "$GITHUB_WORKSPACE/changed.txt"
          fi

      - name: Commit refreshed output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A _Tools/extract_for_rag/rag-extracted   # -A stages deletions too
          if git diff --staged --quiet; then
            echo "No changes to rag-extracted/."
          else
            git commit -m "chore(rag): refresh rag-extracted HTML [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5   # bundles upload-artifact@v7 (Node 24)
        with:
          path: _Tools/extract_for_rag/rag-extracted

  deploy:
    needs: extract        # skipped if extraction failed -> never publishes broken/garbage output
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5   # Node 24
